<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR Face - Lentes Personalizados</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-face="userFill: false; uiScanning: no; filterMinCF:0.001; filterBeta: 0.1;" 
      embedded 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="lentesModel" src="./lentes.glb"></a-asset-item>
        <a-asset-item id="bigoteModel" src="./bigote.glb"></a-asset-item>
      </a-assets>

      <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model 
          src="#lentesModel" 
          rotation="0 0 0" 
          position="0 0 0" 
          scale="1 1 1">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 2">
        <a-gltf-model 
          src="#bigoteModel" 
          rotation="180 0 0" 
          position="0 -0.1 0" 
          scale="0.3 0.3 0.3">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      // Forzar cámara trasera si es necesario
      document.addEventListener("DOMContentLoaded", () => {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener('arready', () => {
            console.log("MindAR está listo");
        });
      });
    </script>
  </body>
</html>
